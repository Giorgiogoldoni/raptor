<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="RAPTOR"/>
<meta name="theme-color" content="#ffffff"/>
<title>RAPTOR iPhone</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blu:#007AFF;--bluscuro:#0051A8;--verde:#34C759;--rosso:#FF3B30;
  --arancio:#FF9500;--giallo:#FFCC00;--viola:#AF52DE;
  --bg:#F2F2F7;--card:#FFFFFF;--border:#C6C6C8;--sep:#E5E5EA;
  --text:#000000;--sub:#8E8E93;--sub2:#C7C7CC;
  --safe-top:env(safe-area-inset-top,44px);
  --safe-bot:env(safe-area-inset-bottom,20px);
}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;color:var(--text);overflow:hidden}

/* ── HEADER ── */
.hdr{
  background:rgba(255,255,255,.92);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);
  border-bottom:0.5px solid var(--sep);position:sticky;top:0;z-index:20;
  padding:calc(var(--safe-top) + 8px) 16px 0;
}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:10px}
.hdr-title{font-size:17px;font-weight:700;color:var(--text)}
.hdr-sub{font-size:11px;color:var(--sub);margin-top:1px}
.ts-lbl{font-size:11px;color:var(--sub)}
.ts-lbl strong{color:var(--verde)}
.badge-new{background:var(--rosso);color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:2px 7px;min-width:20px;text-align:center;display:inline-block}

/* ── SORT BAR ── */
.sort-bar{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;scrollbar-width:none;background:var(--card);border-bottom:0.5px solid var(--sep)}
.sort-bar::-webkit-scrollbar{display:none}
.sort-btn{border:none;border-radius:20px;padding:5px 13px;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;font-family:inherit;background:var(--bg);color:var(--sub)}
.sort-btn.act{background:var(--blu);color:#fff}

/* ── FILTER CHIPS ── */
.filter-row{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;scrollbar-width:none;border-bottom:0.5px solid var(--sep)}
.filter-row::-webkit-scrollbar{display:none}
.chip{border:none;border-radius:20px;padding:5px 13px;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;font-family:inherit;background:var(--bg);color:var(--sub);position:relative}
.chip.act{background:var(--blu);color:#fff}
.chip .cnt{font-size:10px;font-weight:700;margin-left:3px;opacity:.8}

/* ── BTN CALCOLA ── */
.btn-calc{
  width:100%;border:none;border-radius:0;padding:13px;
  font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;
  background:var(--blu);color:#fff;letter-spacing:-.2px;
}
.btn-calc:active{background:var(--bluscuro)}
.btn-calc:disabled{background:#AEB0B4}

/* ── PROGRESS ── */
.prog-box{background:var(--card);padding:14px 16px;border-bottom:0.5px solid var(--sep);display:none}
.prog-lbl{font-size:13px;font-weight:600;margin-bottom:8px;color:var(--text)}
.prog-bar{background:var(--sep);border-radius:4px;height:5px;overflow:hidden}
.prog-fill{background:var(--blu);height:100%;border-radius:4px;transition:width .15s}
.prog-sub{font-size:11px;color:var(--sub);margin-top:5px;text-align:center}

/* ── LISTA ── */
.main-list{overflow-y:auto;-webkit-overflow-scrolling:touch;height:calc(100vh - var(--safe-top) - var(--safe-bot) - 190px)}
.section-hdr{padding:8px 16px 4px;font-size:12px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;background:var(--bg)}

/* ── RIGA TICKER ── */
.tk{display:flex;align-items:center;background:var(--card);padding:11px 14px;border-bottom:0.5px solid var(--sep);gap:10px;cursor:pointer;-webkit-user-select:none}
.tk:active{background:#F2F2F7}
.tk-left{display:flex;flex-direction:column;gap:3px;min-width:0;flex:1}
.tk-top{display:flex;align-items:center;gap:7px}
.tk-sym{font-size:16px;font-weight:700;font-family:'SF Mono','Courier New',monospace;color:var(--text)}
.tk-sig{border-radius:5px;font-size:10px;font-weight:700;padding:2px 7px;white-space:nowrap}
.sig-long{background:#d1fae5;color:#065f46}
.sig-early{background:#dbeafe;color:#1e40af}
.sig-watch{background:#fef9c3;color:#713f12}
.sig-rosso{background:#f3f4f6;color:#374151}
.tk-bottom{display:flex;align-items:center;gap:8px}
.tk-cat{font-size:10px;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px}
.tk-stato{font-size:10px;font-weight:600}
.stato-verde{color:var(--verde)}
.stato-rosso{color:var(--rosso)}
.stato-grigio{color:var(--sub)}
.tk-uscita{font-size:10px;font-weight:700}
.usc-stop{color:var(--rosso)}
.usc-uscita{color:var(--arancio)}
.usc-att{color:var(--giallo)}

/* DESTRA — PERFORMANCE */
.tk-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;min-width:80px}
.tk-perf-row{display:flex;gap:6px;align-items:center}
.perf{font-size:11px;font-weight:600;min-width:42px;text-align:right}
.perf.pos{color:var(--verde)}
.perf.neg{color:var(--rosso)}
.perf.neu{color:var(--sub)}
.tk-score{font-size:14px;font-weight:700;color:var(--blu)}
.tk-date{font-size:10px;color:var(--sub2)}

/* BADGE NUOVO */
.badge-n{background:var(--rosso);color:#fff;border-radius:4px;font-size:9px;font-weight:800;padding:1px 5px;letter-spacing:.3px}

/* EMPTY */
.empty{padding:60px 20px;text-align:center;color:var(--sub);font-size:14px;background:var(--card)}
.empty-ico{font-size:44px;display:block;margin-bottom:10px}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="hdr-title">🦅 RAPTOR</div>
      <div class="hdr-sub" id="hdrSub">Premi CALCOLA per aggiornare</div>
    </div>
    <div style="text-align:right">
      <div class="ts-lbl" id="tsLbl"></div>
      <div id="newBadgeWrap" style="margin-top:3px;display:none">
        <span class="badge-new" id="newBadge">0 NEW</span>
      </div>
    </div>
  </div>
  <!-- SORT -->
  <div class="sort-bar">
    <button class="sort-btn act" id="s-score"  onclick="setSort('score',this)">Score ↓</button>
    <button class="sort-btn"     id="s-date"   onclick="setSort('date',this)">Data Ing.</button>
    <button class="sort-btn"     id="s-giorno" onclick="setSort('giorno',this)">Giorno%</button>
    <button class="sort-btn"     id="s-sett"   onclick="setSort('sett',this)">Sett%</button>
    <button class="sort-btn"     id="s-mese"   onclick="setSort('mese',this)">Mese%</button>
  </div>
  <!-- FILTRI SEGNALE -->
  <div class="filter-row">
    <button class="chip act" onclick="setFilt('ALL',this)">Tutti</button>
    <button class="chip"     onclick="setFilt('LONG',this)">🟢 LONG <span class="cnt" id="f-long">0</span></button>
    <button class="chip"     onclick="setFilt('EARLY',this)">🔵 EARLY <span class="cnt" id="f-early">0</span></button>
    <button class="chip"     onclick="setFilt('WATCH',this)">🟡 WATCH <span class="cnt" id="f-watch">0</span></button>
    <button class="chip"     onclick="setFilt('STOP',this)">⛔ STOP <span class="cnt" id="f-stop">0</span></button>
    <button class="chip"     onclick="setFilt('NEW',this)">🔴 NEW <span class="cnt" id="f-new">0</span></button>
  </div>
</div>

<!-- BTN + PROGRESS -->
<button class="btn-calc" id="btnCalc" onclick="startCalc()">⚡ CALCOLA RANKING LIVE</button>
<div class="prog-box" id="progBox">
  <div class="prog-lbl" id="progLbl">Analisi...</div>
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <div class="prog-sub" id="progSub"></div>
</div>

<!-- LISTA -->
<div class="main-list" id="mainList">
  <div class="empty"><span class="empty-ico">📊</span>Premi CALCOLA per avviare l'analisi live dei 701 ticker.</div>
</div>

// ══════════════════════════════════════════════
// INDICATORI
// ══════════════════════════════════════════════
function calcKAMA(cs, n=10, fast=2, slow=30) {
  const fsc=2/(fast+1), ssc=2/(slow+1);
  const out=cs.map(()=>null);
  let start=-1;
  for (let i=0;i<cs.length;i++) {
    if (cs[i]==null) continue;
    if (start<0) { out[i]=cs[i]; start=i; continue; }
    if (i-start<n) { out[i]=out[i-1]??cs[i]; continue; }
    const dir=Math.abs(cs[i]-cs[i-n]);
    let vlt=0; for(let j=i-n+1;j<=i;j++) vlt+=Math.abs(cs[j]-cs[j-1]);
    const er=vlt>0?dir/vlt:0;
    const sc=Math.pow(er*(fsc-ssc)+ssc,2);
    out[i]=(out[i-1]??cs[i])+sc*(cs[i]-(out[i-1]??cs[i]));
  }
  return out;
}
function calcATR(h,l,c,n=14) {
  const tr=h.map((hi,i)=>i===0?hi-l[i]:Math.max(hi-l[i],Math.abs(hi-c[i-1]),Math.abs(l[i]-c[i-1])));
  const out=tr.map(()=>null);
  if(tr.length<n) return out;
  let v=tr.slice(0,n).reduce((a,b)=>a+b,0)/n; out[n-1]=v;
  for(let i=n;i<tr.length;i++){v=(v*(n-1)+tr[i])/n;out[i]=v;}
  return out;
}
function calcRSI(cs, n=14) {
  const out=cs.map(()=>null);
  if(cs.length<n+1) return out;
  let ag=0,al=0;
  for(let i=1;i<=n;i++){const d=cs[i]-cs[i-1];d>0?ag+=d:al-=d;}
  ag/=n; al/=n;
  out[n]=al===0?100:100-100/(1+ag/al);
  for(let i=n+1;i<cs.length;i++){
    const d=cs[i]-cs[i-1];
    ag=(ag*(n-1)+(d>0?d:0))/n; al=(al*(n-1)+(d<0?-d:0))/n;
    out[i]=al===0?100:100-100/(1+ag/al);
  }
  return out;
}
function calcER(cs, n=10) {
  return cs.map((_,i) => {
    if(i<n) return null;
    const dir=Math.abs(cs[i]-cs[i-n]);
    let vlt=0; for(let j=i-n+1;j<=i;j++) vlt+=Math.abs(cs[j]-cs[j-1]);
    return vlt>0?dir/vlt:0;
  });
}
function calcTrendycator(cs) {
  const ef=ema(cs,21), el=ema(cs,55);
  return ef.map((v,i)=>{
    if(v==null||el[i]==null||i===0||ef[i-1]==null) return 0;
    if(v>el[i]&&v>ef[i-1]) return 1;
    if(v<el[i]&&v<ef[i-1]) return -1;
    return 0;
  });
}
function calcBaffetti(ao) {
  const n=ao.length-1;
  let count=0;
  for(let i=n;i>0;i--){
    if(ao[i]==null||ao[i-1]==null) break;
    if(ao[i]>ao[i-1]) count++;
    else break;
  }
  return count;
}
function findCrossoverDays(cs, kama) {
  const n=cs.length-1;
  for(let i=n;i>0;i--){
    if(kama[i]==null||kama[i-1]==null) continue;
    if(cs[i]>kama[i] && cs[i-1]<=kama[i-1]) return n-i;
  }
  return 999;
}
function findCrossoverDate(cs, kama, timestamps) {
  const n=cs.length-1;
  for(let i=n;i>0;i--){
    if(kama[i]==null||kama[i-1]==null) continue;
    if(cs[i]>kama[i] && cs[i-1]<=kama[i-1]) {
      const d=new Date(timestamps[i]*1000);
      return d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});
    }
  }
  return '—';
}
function calcPerf(cs, days) {
  const n=cs.length-1;
  if(n<days) return 0;
  const prev=cs[n-days];
  if(!prev) return 0;
  return (cs[n]-prev)/prev*100;
}

// ══════════════════════════════════════════════════════
// PROCESS ONE TICKER
// ══════════════════════════════════════════════════════
function processTicker(raw, info) {
  const ts=raw.timestamp||[];
  const q=raw.indicators.quote[0];
  const closes=q.close||[], highs=q.high||[], lows=q.low||[];
  const valid=ts.map((t,i)=>({t,c:closes[i],h:highs[i],l:lows[i]})).filter(x=>x.c!=null&&x.h!=null&&x.l!=null);
  if(valid.length<60) return {ticker:info.y,display:info.t,categoria:info.c,error:'Dati insufficienti ('+valid.length+')'};

  const cs=valid.map(x=>x.c), hs=valid.map(x=>x.h), ls=valid.map(x=>x.l);
  const n=cs.length-1;

  // Calcola indicatori
  const kama=calcKAMA(cs);
  const e7=ema(cs,7), e34=ema(cs,34);
  const ao=e7.map((v,i)=>v!=null&&e34[i]!=null?v-e34[i]:null);
  const rsi=calcRSI(cs,14);
  const er=calcER(cs,10);
  const mm20=sma(cs,20), mm50=sma(cs,50), mm200=sma(cs,200);
  const tc=calcTrendycator(cs);

  // Ultimi valori
  const lc=cs[n], lk=kama[n], lr=rsi[n]??0;
  const ler=er[n]??0, lao=ao[n]??0;
  const lmm20=mm20[n], lmm50=mm50[n], lmm200=mm200[n];
  const ltc=tc[n];

  // Trendycator stato
  const stato=ltc===1?'VERDE':ltc===-1?'ROSSO':'GRIGIO';

  // Condizioni
  const pAboveKama=lk!=null&&lc>lk;
  const erOk=ler>=0.5;
  const baffCount=calcBaffetti(ao);
  const baf3=baffCount>=3;
  const mmAlign=lmm20!=null&&lmm50!=null&&lc>lmm20&&lmm20>lmm50&&(lmm200==null||lc>lmm200);
  const aoPositive=lao>0;
  const crossDays=findCrossoverDays(cs,kama);
  const validTs=valid.map(x=>x.t);
  const entryDate=findCrossoverDate(cs,kama,validTs);

  // Performance
  const perfGiorno=n>=1&&cs[n-1]?(cs[n]-cs[n-1])/cs[n-1]*100:0;
  const perfSett=calcPerf(cs,5);
  const perfMese=calcPerf(cs,22);

  // SCORE
  const erScore=ler*30;
  const bafScore=Math.min(baffCount,10)*5;
  const pkPct=lk?Math.abs((lc-lk)/lk*100):0;
  const pkScore=Math.min(pkPct,5)*3;
  const settScore=Math.min(Math.max(perfSett,-10),5)*4;
  const meseScore=Math.min(Math.max(perfMese,-20),10)*2;
  const mmBonus=mmAlign?10:0;
  const aoBonus=aoPositive?5:0;
  const crossBonus=crossDays<=3?20:crossDays<=10?12:crossDays<=20?5:0;
  let score=(erScore+bafScore+pkScore+settScore+meseScore+mmBonus+aoBonus+crossBonus);
  if(stato==='ROSSO') score*=0.6;
  score=Math.max(0,Math.round(score*10)/10);

  // Segnale
  let tipo='';
  if(stato==='VERDE'&&pAboveKama&&erOk&&baf3&&mmAlign) tipo='🟢 LONG';
  else if(pAboveKama&&baf3&&(stato==='VERDE'||stato==='GRIGIO')) tipo='🔵 EARLY';
  else if(pAboveKama&&baffCount>=1&&(stato==='VERDE'||stato==='GRIGIO')) tipo='🟡 WATCH';
  else if(stato==='ROSSO'&&crossDays<=3&&baf3) tipo='⚪ ROSSO+';

  // Segnale uscita (rilevante solo se il ticker era LONG)
  let uscita='';
  if(stato==='ROSSO') uscita='⛔ STOP';
  else if(!pAboveKama) uscita='🔴 USCITA';
  else if(stato==='GRIGIO'||lao<=0) uscita='🟡 ATTENZIONE';

  const meta=raw.meta;
  const nome=meta.longName||meta.shortName||info.t;

  return {
    ticker:info.y, display:info.t, nome, categoria:info.c,
    prezzo:lc, kama:lk, er:ler, ao:lao, rsi:lr,
    mm20:lmm20, mm50:lmm50, mm200:lmm200,
    pAboveKama, erOk, baf3, baffCount, mmAlign, aoPositive,
    crossDays, entryDate, pkPct, perfGiorno, perfSett, perfMese,
    stato, score, tipo, uscita, error:null
  };
}
function findCrossoverDays(cs, kama) {
  const n=cs.length-1;
  for(let i=n;i>0;i--){
    if(kama[i]==null||kama[i-1]==null) continue;
    if(cs[i]>kama[i] && cs[i-1]<=kama[i-1]) return n-i;
  }
  return 999;
}
function findCrossoverDate(cs, kama, timestamps) {
  const n=cs.length-1;
  for(let i=n;i>0;i--){
    if(kama[i]==null||kama[i-1]==null) continue;
    if(cs[i]>kama[i] && cs[i-1]<=kama[i-1]) {
      const d=new Date(timestamps[i]*1000);
      return d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});
    }
  }
  return '—';
}

// FETCH YAHOO
// ══════════════════════════════════════════════
async function fetchYahoo(symbol){
  const enc=encodeURIComponent(symbol);
  const yurl=`https://query1.finance.yahoo.com/v8/finance/chart/${enc}?interval=1d&range=1y&includePrePost=false`;
  const proxies=[
    // proxy 1: corsproxy.io — più affidabile
    async ()=>{
      const r=await fetch(`https://corsproxy.io/?${encodeURIComponent(yurl)}`);
      if(!r.ok) throw new Error('ko');
      const j=await r.json();
      return j.chart?.result?.[0]||null;
    },
    // proxy 2: allorigins
    async ()=>{
      const r=await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(yurl)}`);
      if(!r.ok) throw new Error('ko');
      const t=await r.text();
      const j=JSON.parse(t);
      const raw=j.contents?JSON.parse(j.contents):j;
      return raw.chart?.result?.[0]||null;
    },
    // proxy 3: codetabs
    async ()=>{
      const r=await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(yurl)}`);
      if(!r.ok) throw new Error('ko');
      const j=await r.json();
      return j.chart?.result?.[0]||null;
    },
    // proxy 4: yahoo diretto (funziona in alcuni browser)
    async ()=>{
      const r=await fetch(yurl,{mode:'cors'});
      if(!r.ok) throw new Error('ko');
      const j=await r.json();
      return j.chart?.result?.[0]||null;
    },
  ];
  for(const fn of proxies){
    try{
      const p=fn();
      const res=await Promise.race([p, new Promise((_,rj)=>setTimeout(()=>rj(new Error('timeout')),10000))]);
      if(res) return res;
    }catch(e){ continue; }
  }
  return null;
}

async function startCalc(){
  const btn=document.getElementById('btnCalc');
  btn.disabled=true; btn.textContent='⏳ Calcolo in corso...';
  document.getElementById('progBox').style.display='block';
  allResults=[];

  for(let i=0;i<TICKERS.length;i+=6){
    const batch=TICKERS.slice(i,i+6);
    await Promise.all(batch.map(async info=>{
      try{
        const raw=await fetchYahoo(info.y);
        if(!raw) return;
        const r=processTicker(raw,info);
        if(r&&!r.error) allResults.push(r);
      }catch(e){}
    }));
    const pct=Math.round(Math.min((i+6)/TICKERS.length*100,100));
    document.getElementById('progFill').style.width=pct+'%';
    document.getElementById('progSub').textContent=Math.min(i+6,TICKERS.length)+' / '+TICKERS.length+' · LONG: '+allResults.filter(r=>r.tipo==='🟢 LONG').length;
    document.getElementById('progLbl').textContent='Analisi… '+pct+'%';
    await new Promise(res=>setTimeout(res,60));
  }

  document.getElementById('progBox').style.display='none';

  // Aggiungi performance giorno
  allResults.forEach(r=>{ r.isNew = prevState[r.ticker]&&prevState[r.ticker]!==r.tipo&&r.tipo==='🟢 LONG'; });

  // Salva
  const ts=new Date().toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
  try{
    localStorage.setItem('raptor_ranking',JSON.stringify(allResults));
    localStorage.setItem('raptor_ranking_ts',ts);
    // Aggiorna prevState con lo stato corrente
    const newState={};
    allResults.forEach(r=>{ newState[r.ticker]=r.tipo; });
    localStorage.setItem('raptor_prev_state',JSON.stringify(newState));
    prevState=newState;
  }catch(e){}

  document.getElementById('tsLbl').innerHTML='Agg.: <strong>'+ts+'</strong>';
  document.getElementById('hdrSub').textContent=allResults.length+' ticker analizzati';
  btn.disabled=false; btn.textContent='🔄 RICALCOLA';
  updateCounts(); renderList();
}

// ══════════════════════════════════════════════
// CONTATORI
// ══════════════════════════════════════════════
function updateCounts(){
  const cnt=t=>allResults.filter(r=>r.tipo===t).length;
  document.getElementById('f-long').textContent  = cnt('🟢 LONG');
  document.getElementById('f-early').textContent = cnt('🔵 EARLY');
  document.getElementById('f-watch').textContent = cnt('🟡 WATCH');
  document.getElementById('f-stop').textContent  = allResults.filter(r=>r.uscita==='⛔ STOP').length;
  const newCnt = allResults.filter(r=>r.isNew).length;
  document.getElementById('f-new').textContent   = newCnt;
  const nw=document.getElementById('newBadgeWrap');
  if(newCnt>0){
    document.getElementById('newBadge').textContent=newCnt+' NEW';
    nw.style.display='block';
  } else { nw.style.display='none'; }
}

// ══════════════════════════════════════════════
// SORT
// ══════════════════════════════════════════════
function setSort(col, btn){
  if(activeSort===col) sortDir*=-1;
  else { activeSort=col; sortDir=-1; }
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('act'));
  btn.classList.add('act');
  btn.textContent = {score:'Score',date:'Data Ing.',giorno:'Giorno%',sett:'Sett%',mese:'Mese%'}[col] + (sortDir===-1?' ↓':' ↑');
  renderList();
}

function setFilt(f,btn){
  activeFilt=f;
  document.querySelectorAll('.chip').forEach(b=>b.classList.remove('act'));
  btn.classList.add('act');
  renderList();
}

function dateToNum(s){
  if(!s||s==='—') return 0;
  const p=String(s).split('/');
  if(p.length===3) return parseInt(p[2]+p[1].padStart(2,'0')+p[0].padStart(2,'0'));
  return 0;
}

function getSortVal(r){
  if(activeSort==='score')  return r.score||0;
  if(activeSort==='date')   return dateToNum(r.entryDate);
  if(activeSort==='giorno') return r.perfGiorno||0;
  if(activeSort==='sett')   return r.perfSett||0;
  if(activeSort==='mese')   return r.perfMese||0;
  return 0;
}

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function renderList(){
  let data=[...allResults];
  // Filtro
  if(activeFilt==='LONG')  data=data.filter(r=>r.tipo==='🟢 LONG');
  else if(activeFilt==='EARLY') data=data.filter(r=>r.tipo==='🔵 EARLY');
  else if(activeFilt==='WATCH') data=data.filter(r=>r.tipo==='🟡 WATCH');
  else if(activeFilt==='STOP')  data=data.filter(r=>r.uscita==='⛔ STOP');
  else if(activeFilt==='NEW')   data=data.filter(r=>r.isNew);

  // Sort: NEW sempre in cima, poi per criterio scelto
  data.sort((a,b)=>{
    if(a.isNew&&!b.isNew) return -1;
    if(!a.isNew&&b.isNew) return 1;
    return (getSortVal(b)-getSortVal(a))*sortDir*-1; // sortDir -1 = desc
  });
  // Correzione: sortDir -1 vuol dire discendente
  data.sort((a,b)=>{
    if(a.isNew&&!b.isNew) return -1;
    if(!a.isNew&&b.isNew) return 1;
    const va=getSortVal(a), vb=getSortVal(b);
    return sortDir===-1?(vb-va):(va-vb);
  });

  const list=document.getElementById('mainList');
  if(!data.length){
    list.innerHTML='<div class="empty"><span class="empty-ico">📭</span>Nessun risultato</div>';
    return;
  }

  // Separa NEW dal resto
  const news=data.filter(r=>r.isNew);
  const rest=data.filter(r=>!r.isNew);

  let html='';
  if(news.length&&activeFilt!=='NEW'){
    html+=`<div class="section-hdr">🔴 NUOVI LONG (${news.length})</div>`;
    html+=news.map(r=>tkRow(r)).join('');
    html+=`<div class="section-hdr">${data.length-news.length} ticker</div>`;
  }
  html+=rest.map(r=>tkRow(r)).join('');
  list.innerHTML=html;
}

function fP(v){ if(v==null) return '<span class="perf neu">—</span>'; const s=(v>=0?'+':'')+v.toFixed(2)+'%'; return `<span class="perf ${v>0?'pos':v<0?'neg':'neu'}">${s}</span>`; }

function sigClass(t){
  if(t==='🟢 LONG') return 'sig-long';
  if(t==='🔵 EARLY') return 'sig-early';
  if(t==='🟡 WATCH') return 'sig-watch';
  return 'sig-rosso';
}
function statoClass(s){ if(s==='VERDE') return 'stato-verde'; if(s==='ROSSO') return 'stato-rosso'; return 'stato-grigio'; }

function tkRow(r){
  const sym=r.display||r.ticker||'';
  const tvSym=encodeURIComponent(sym);
  // TradingView link
  const tvUrl=`https://www.tradingview.com/chart/?symbol=${tvSym}`;
  const uscitaHtml=r.uscita?`<span class="tk-uscita ${r.uscita.includes('STOP')?'usc-stop':r.uscita.includes('USCITA')?'usc-uscita':'usc-att'}">${r.uscita}</span>`:'';
  const newBadge=r.isNew?'<span class="badge-n">NEW</span>':'';
  return `<div class="tk" onclick="openTV('${tvUrl}')">
    <div class="tk-left">
      <div class="tk-top">
        <span class="tk-sym">${sym}</span>
        ${r.tipo?`<span class="tk-sig ${sigClass(r.tipo)}">${r.tipo}</span>`:''}
        ${newBadge}
      </div>
      <div class="tk-bottom">
        <span class="tk-cat">${r.categoria||''}</span>
        <span class="tk-stato ${statoClass(r.stato)}">${r.stato||''}</span>
        ${uscitaHtml}
      </div>
    </div>
    <div class="tk-right">
      <div class="tk-perf-row">${fP(r.perfGiorno)} ${fP(r.perfSett)} ${fP(r.perfMese)}</div>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="tk-date">${r.entryDate||'—'}</span>
        <span class="tk-score">${r.score}</span>
      </div>
    </div>
  </div>`;
}

function openTV(url){ window.open(url,'_blank'); }

</script>
</body>
</html>
