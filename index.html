<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raptor One - Pro Dashboard</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .buy-row { border-left: 4px solid #10b981; }
        .sell-row { border-left: 4px solid #ef4444; }
        .sparkline { stroke-width: 2; fill: none; }
        .badge-new { background: #3b82f6; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-4xl font-black tracking-tighter italic">RAPTOR <span class="text-blue-500 text-not-italic">ONE</span></h1>
                <p id="last-update" class="text-slate-400 text-xs mt-1 tracking-widest uppercase"></p>
            </div>
            <button onclick="downloadExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 transition-all shadow-lg shadow-emerald-900/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
                REPORT EXCEL
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="card p-6 flex items-center justify-between">
                <div>
                    <p class="text-slate-400 text-sm font-medium">TOTALE ASSET</p>
                    <h3 id="stat-total" class="text-3xl font-bold">0</h3>
                </div>
                <div class="text-blue-500 bg-blue-500/10 p-3 rounded-full">📊</div>
            </div>
            <div class="card p-6 flex items-center justify-between border-t-4 border-t-green-500">
                <div>
                    <p class="text-slate-400 text-sm font-medium">BUY SIGNALS</p>
                    <h3 id="stat-buy" class="text-3xl font-bold text-green-400">0</h3>
                </div>
                <div class="text-green-500 bg-green-500/10 p-3 rounded-full">📈</div>
            </div>
            <div class="card p-6 flex items-center justify-between border-t-4 border-t-red-500">
                <div>
                    <p class="text-slate-400 text-sm font-medium">SELL SIGNALS</p>
                    <h3 id="stat-sell" class="text-3xl font-bold text-red-400">0</h3>
                </div>
                <div class="text-red-500 bg-red-500/10 p-3 rounded-full">📉</div>
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-4 mb-6">
            <input type="text" id="search" placeholder="🔍 Filtra tra i 128 titoli..." 
                   class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-6 py-4 focus:ring-2 focus:ring-blue-500 outline-none text-lg">
            
            <div class="flex gap-2">
                <button onclick="render(allData)" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-xl text-sm font-bold transition">TUTTI</button>
                <button onclick="filterNew()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-xl text-sm font-bold transition">NUOVI (48h)</button>
            </div>
        </div>

        <div class="card overflow-hidden">
            <table class="w-full text-left">
                <thead>
                    <tr class="bg-slate-800/50 text-slate-400 text-xs uppercase tracking-wider">
                        <th class="p-4">Trend</th>
                        <th class="p-4">Strumento</th>
                        <th class="p-4 text-center">Trend 15d</th>
                        <th class="p-4 text-right">Prezzo</th>
                        <th class="p-4 text-center">Data Segnale</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        let allData = [];

        function createSparkline(prices) {
            if (!prices || prices.length < 2) return '';
            const min = Math.min(...prices);
            const max = Math.max(...prices);
            const range = max - min || 1;
            const points = prices.map((p, i) => `${(i / (prices.length - 1)) * 100},${30 - ((p - min) / range) * 30}`).join(' ');
            const color = prices[prices.length-1] > prices[0] ? '#10b981' : '#ef4444';
            return `<svg width="100" height="30" class="mx-auto"><polyline points="${points}" class="sparkline" style="stroke: ${color}" /></svg>`;
        }

        async function loadData() {
            try {
                const response = await fetch('data.json');
                const json = await response.json();
                allData = json.data;
                document.getElementById('last-update').innerText = "Last Sync: " + json.last_update;
                updateStats(allData);
                render(allData);
            } catch (e) { console.error(e); }
        }

        function updateStats(data) {
            document.getElementById('stat-total').innerText = data.length;
            document.getElementById('stat-buy').innerText = data.filter(i => i.status === 'BUY').length;
            document.getElementById('stat-sell').innerText = data.filter(i => i.status === 'SELL').length;
        }

        function render(data) {
            const body = document.getElementById('table-body');
            body.innerHTML = data.map(item => {
                const isBuy = item.status === 'BUY';
                // Verifica se il segnale è nuovo (ultime 48 ore)
                const isNew = checkIsNew(item.signal_date);
                
                return `
                    <tr class="border-b border-slate-700/50 hover:bg-slate-800/30 transition ${isBuy ? 'buy-row' : 'sell-row'}">
                        <td class="p-4">
                            <div class="flex items-center gap-2 font-bold ${isBuy ? 'text-green-400' : 'text-red-400'}">
                                <span>${isBuy ? '▲' : '▼'}</span> ${item.status}
                                ${isNew ? '<span class="badge-new">NEW</span>' : ''}
                            </div>
                        </td>
                        <td class="p-4">
                            <div class="font-bold">${item.ticker}</div>
                            <div class="text-[10px] text-slate-500 uppercase">${item.nome}</div>
                        </td>
                        <td class="p-4">${createSparkline(item.history ? item.history.prices : [])}</td>
                        <td class="p-4 text-right font-mono text-blue-400 font-bold">${item.price.toFixed(3)}</td>
                        <td class="p-4 text-center text-slate-500 text-sm">${item.signal_date}</td>
                    </tr>
                `;
            }).join('');
        }

        function checkIsNew(dateStr) {
            try {
                const parts = dateStr.split('/');
                const signalDate = new Date(parts[2], parts[1] - 1, parts[0]);
                const diffTime = Math.abs(new Date() - signalDate);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                return diffDays <= 2;
            } catch (e) { return false; }
        }

        function filterNew() {
            render(allData.filter(i => checkIsNew(i.signal_date)));
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            render(allData.filter(i => i.ticker.toLowerCase().includes(val) || i.nome.toLowerCase().includes(val)));
        });

        function downloadExcel() {
            const ws = XLSX.utils.json_to_sheet(allData.map(i => ({ Ticker: i.ticker, Nome: i.nome, Status: i.status, Data: i.signal_date })));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Raptor");
            XLSX.writeFile(wb, `Raptor_Report_${new Date().toLocaleDateString()}.xlsx`);
        }

        loadData();
    </script>
</body>
</html>
