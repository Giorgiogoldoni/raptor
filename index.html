<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAPTOR Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .card { background-color: #1e293b; border-radius: 8px; padding: 20px; }
    </style>
</head>
<body class="p-5">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-2 text-blue-400">RAPTOR SYSTEM</h1>
        <p id="update-time" class="text-gray-400 mb-6 italic">Caricamento dati...</p>

        <div class="overflow-x-auto card">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b border-gray-700 text-gray-400">
                        <th class="p-3">Ticker</th>
                        <th class="p-3">Prezzo</th>
                        <th class="p-3">KAMA V</th>
                        <th class="p-3">KAMA L</th>
                        <th class="p-3">Stato</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                // Legge il file data.json nella stessa cartella
                const response = await fetch('data.json');
                const result = await response.json();
                
                document.getElementById('update-time').innerText = "Ultimo aggiornamento: " + result.last_update;
                
                const tableBody = document.getElementById('table-body');
                tableBody.innerHTML = '';

                result.data.forEach(item => {
                    const row = document.createElement('tr');
                    row.className = "border-b border-gray-800 hover:bg-gray-800 transition";
                    
                    // Logica colore stato
                    const color = item.price > item.kama_v ? 'text-green-400' : 'text-red-400';
                    const status = item.price > item.kama_v ? 'BUY' : 'SELL';

                    row.innerHTML = `
                        <td class="p-3 font-bold">${item.ticker}</td>
                        <td class="p-3">${item.price.toFixed(2)}</td>
                        <td class="p-3 text-gray-400">${item.kama_v.toFixed(2)}</td>
                        <td class="p-3 text-gray-400">${item.kama_l.toFixed(2)}</td>
                        <td class="p-3 font-bold ${color}">${status}</td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error("Errore caricamento dati:", error);
                document.getElementById('update-time').innerText = "Errore: File data.json non trovato o non valido.";
            }
        }

        loadData();
    </script>
</body>
</html>
