<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raptor One - Dashboard</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .status-buy { color: #10b981; font-weight: bold; }
        .status-sell { color: #ef4444; font-weight: bold; }
        .status-wait { color: #64748b; font-weight: bold; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-900">RAPTOR <span class="text-blue-600">ONE</span></h1>
                <p id="last-update" class="text-slate-500 text-sm">Caricamento dati...</p>
            </div>
            
            <div class="flex gap-2">
                <button onclick="downloadExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg font-semibold transition flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="浸 12h.01M12 20h.01M12 4h.01M12 12h.01M12 12h.01M12 12h.01" />
                    </svg>
                    SCARICA EXCEL
                </button>
            </div>
        </div>

        <div class="card p-4 mb-6 flex flex-wrap gap-4 items-center justify-between">
            <input type="text" id="search" placeholder="Cerca ticker o nome..." 
                   class="border border-slate-200 rounded-lg px-4 py-2 w-full md:w-80 focus:ring-2 focus:ring-blue-500 outline-none">
            
            <div class="flex gap-2" id="filter-buttons">
                <button onclick="filterData('TUTTI')" class="px-4 py-2 rounded-md bg-blue-600 text-white text-sm font-medium">TUTTI</button>
                <button onclick="filterData('ETF LEVA')" class="px-4 py-2 rounded-md bg-slate-100 hover:bg-slate-200 text-sm font-medium">ETF LEVA</button>
                <button onclick="filterData('LEVA 3X')" class="px-4 py-2 rounded-md bg-slate-100 hover:bg-slate-200 text-sm font-medium">LEVA 3X</button>
                <button onclick="filterData('CRYPTO')" class="px-4 py-2 rounded-md bg-slate-100 hover:bg-slate-200 text-sm font-medium">CRYPTO</button>
            </div>
        </div>

        <div class="card overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200">
                            <th class="p-4 font-semibold text-slate-700">TREND</th>
                            <th class="p-4 font-semibold text-slate-700">STRUMENTO</th>
                            <th class="p-4 font-semibold text-slate-700 text-right">PREZZO</th>
                            <th class="p-4 font-semibold text-slate-700 text-right text-xs">KAMA VELOCE</th>
                            <th class="p-4 font-semibold text-slate-700 text-right text-xs">KAMA LENTA</th>
                            <th class="p-4 font-semibold text-slate-700 text-center">DATA SEGNALE</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let allData = [];
        let currentFilter = 'TUTTI';

        // 1. Caricamento Dati
        async function loadData() {
            try {
                const response = await fetch('data.json');
                const json = await response.json();
                allData = json.data;
                document.getElementById('last-update').innerText = "UPDATE: " + json.last_update;
                renderTable(allData);
            } catch (e) {
                console.error("Errore caricamento dati:", e);
                document.getElementById('table-body').innerHTML = "<tr><td colspan='6' class='p-4 text-center text-red-500'>Errore caricamento data.json. Assicurati che l'Action sia completata.</td></tr>";
            }
        }

        // 2. Render Tabella
        function renderTable(data) {
            const body = document.getElementById('table-body');
            body.innerHTML = "";

            data.forEach(item => {
                const statusClass = item.status === 'BUY' ? 'status-buy' : (item.status === 'SELL' ? 'status-sell' : 'status-wait');
                const row = `
                    <tr class="border-b border-slate-100 hover:bg-slate-50 transition">
                        <td class="p-4"><span class="${statusClass}">● ${item.status}</span></td>
                        <td class="p-4">
                            <div class="font-bold text-slate-900">${item.ticker}</div>
                            <div class="text-xs text-slate-500 uppercase">${item.nome} | ${item.categoria}</div>
                        </td>
                        <td class="p-4 text-right font-mono font-bold text-blue-700">${item.price.toFixed(3)}</td>
                        <td class="p-4 text-right text-slate-600 text-sm">${item.kama_v.toFixed(3)}</td>
                        <td class="p-4 text-right text-slate-600 text-sm">${item.kama_l.toFixed(3)}</td>
                        <td class="p-4 text-center text-sm text-slate-500">${item.signal_date}</td>
                    </tr>
                `;
                body.innerHTML += row;
            });
        }

        // 3. Funzione Ricerca
        document.getElementById('search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allData.filter(i => 
                i.ticker.toLowerCase().includes(val) || 
                i.nome.toLowerCase().includes(val)
            );
            renderTable(filtered);
        });

        // 4. Funzione Filtro Categoria
        function filterData(cat) {
            currentFilter = cat;
            const filtered = cat === 'TUTTI' ? allData : allData.filter(i => i.categoria === cat);
            renderTable(filtered);
            
            // Aggiorna stile bottoni
            const buttons = document.querySelectorAll('#filter-buttons button');
            buttons.forEach(btn => {
                if(btn.innerText === cat) {
                    btn.classList.replace('bg-slate-100', 'bg-blue-600');
                    btn.classList.replace('text-black', 'text-white');
                } else {
                    btn.classList.add('bg-slate-100');
                    btn.classList.remove('bg-blue-600', 'text-white');
                }
            });
        }

        // 5. Funzione EXCEL
        function downloadExcel() {
            const datiExcel = allData.map(i => ({
                Ticker: i.ticker,
                Nome: i.nome,
                Categoria: i.categoria,
                Prezzo: i.price,
                Status: i.status,
                Data_Segnale: i.signal_date
            }));

            const ws = XLSX.utils.json_to_sheet(datiExcel);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Raptor_Report");
            XLSX.writeFile(wb, `Raptor_One_Report_${new Date().toLocaleDateString()}.xlsx`);
        }

        loadData();
    </script>
</body>
</html>
