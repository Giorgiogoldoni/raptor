<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>RAPTOR System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-6">
    <div class="max-w-3xl mx-auto">
        <h1 class="text-3xl font-bold text-blue-500 mb-2">RAPTOR SYSTEM</h1>
        <p id="info" class="text-gray-400 mb-6 italic text-sm">Sincronizzazione...</p>
        <div class="bg-slate-800 rounded-xl shadow-2xl overflow-hidden">
            <table class="w-full text-left text-sm md:text-base">
                <thead class="bg-slate-700 text-gray-300">
                    <tr>
                        <th class="p-4">Ticker</th>
                        <th class="p-4">Prezzo</th>
                        <th class="p-4">KAMA V</th>
                        <th class="p-4 text-center">Stato</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
    <script>
        async function load() {
            try {
                // Forziamo il caricamento del file fresco
                const r = await fetch('data.json?t=' + Date.now());
                const d = await r.json();
                
                document.getElementById('info').innerText = "Ultimo aggiornamento: " + d.last_update;
                const body = document.getElementById('table-body');
                body.innerHTML = '';
                
                d.data.forEach(item => {
                    const isBuy = item.price > item.kama_v;
                    body.innerHTML += `
                        <tr class="border-b border-slate-700 hover:bg-slate-750 transition">
                            <td class="p-4 font-bold text-blue-300">${item.ticker}</td>
                            <td class="p-4 font-mono font-medium">${item.price.toFixed(2)}</td>
                            <td class="p-4 text-gray-400 font-mono">${item.kama_v.toFixed(2)}</td>
                            <td class="p-4 text-center font-bold ${isBuy ? 'text-green-400' : 'text-red-400'}">
                                ${isBuy ? '▲ BUY' : '▼ SELL'}
                            </td>
                        </tr>`;
                });
            } catch (e) {
                document.getElementById('info').innerText = "Errore: dati in fase di aggiornamento...";
                console.error(e);
            }
        }
        load();
    </script>
</body>
</html>
